<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drill 3 - Password Checker</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 4rem; background: #fef2f2; }
        input { padding: 0.8rem; font-size: 1.2rem; width: 280px; margin: 1rem auto; outline: none;}
        button { padding: 0.8rem 1.5rem; margin-left: 1rem; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #result { margin-top: 2rem; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>Drill 3</h1>
    <input type="password" id="passInput" placeholder="Enter password" > 
    <button id="checkBtn">Check</button>
    <p id="result"></p>

    <script>
        const input = document.getElementById('passInput');
        const button = document.getElementById('checkBtn');
        const result = document.getElementById('result');

        button.addEventListener('click', function(){
            const password = input.value;

            if(password === '') {
                result.textContent = "Enter something!";
            }

            else if(password.length < '8') {
                result.textContent = "Too short!";
                result.style.color = "red";
            }

            else if (password.length >= '12') {
                result.textContent = "Strong password!";
                result.style.color = "green";
            }

            else {
                result.textContent = "Medium strength";
                result.style.color = 'orange';
            }
        })
    </script>
</body>
</html>
