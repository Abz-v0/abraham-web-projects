<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 14 - Wisdom of the Ancients</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Wisdom of the Ancients</h1>
        <p>Seek guidance from the great minds of history</p>

    <img src="https://via.placeholder.com/100x100/8B4513/FFFFFF?text=Ancient" 
         alt="Historical Figure" 
         class="portrait" 
         id="portrait">
        <div class="quote-card">
            <div id="loadingText" class="loading-text">Seeking wisdom...</div>
            <div class="quote-text" id="quoteText">
                "The unexamined life is not worth living."
            </div>
            <div class="quote-author" id="quoteAuthor">
                — Socrates
            </div>
                <button class="copy-button" aria-label="Copy quote" title="Copy to clipboard">
                    <!-- Copy icon -->
                    <svg class="icon-copy" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    
                    <!-- Checkmark icon -->
                    <svg class="icon-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="display: none;">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
        </div>

        <button id="newQuoteBtn" aria-label="Get new quote">Σ</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
